      test_file: actions/generate-k6-manifests/test_service/k8s_wrapper/get_deployments.js
      config_file: ""
      env_file: ""
      contexts:
        - environment: at22
          node_type: default
          test_type:
            type: smoke
            enabled: true
            config_file: ""
          test_run:
            name: get-deployments
            id: at22-get-deployments-smoke
            parallelism: 1
            resources:
                requests:
                    memory: 200Mi
                    cpu: 250m
            env: []
            secrets:
                - token-generator-creds
        - environment: at23
          node_type: default
          test_type:
            type: smoke
            enabled: true
            config_file: actions/generate-k6-manifests/test_service/test_configs/smoke.json
          test_run:
            name: get-deployments
            id: at23-get-deployments-smoke
            parallelism: 1
            resources:
                requests:
                    memory: 200Mi
                    cpu: 250m
            env: []
            secrets:
                - token-generator-creds
