apiVersion: apps/v1
kind: Deployment
metadata:
  name: dis-cache-operator-controller-manager
  namespace: dis-cache-operator-system
spec:
  template:
    spec:
      containers:
        - name: manager
          imagePullPolicy: Never
          args:
            - --leader-elect
            - --health-probe-bind-address=:8081
            - --metrics-bind-address=:8080
            - --metrics-secure=false
          env:
            - name: DISREDIS_AZURE_SUBSCRIPTION_ID
              value: "fake-subscription"
            - name: DISREDIS_RESOURCE_GROUP
              value: "fake-resource-group"
            - name: DISREDIS_AZURE_TENANT_ID
              value: "00000000-0000-0000-0000-000000000000"
            - name: DISREDIS_LOCATION
              value: "norwayeast"
            - name: DISREDIS_ENV
              value: "dev"
            - name: DISREDIS_AKS_SUBNET_IDS
              value: "/subscriptions/fake-subscription/resourceGroups/fake-network-rg/providers/Microsoft.Network/virtualNetworks/fake-vnet/subnets/fake-aks-subnet"
            - name: DISREDIS_AKS_VNET_ID
              value: "/subscriptions/fake-subscription/resourceGroups/fake-network-rg/providers/Microsoft.Network/virtualNetworks/fake-vnet"
            - name: DISREDIS_DNS_ZONE_RESOURCE_GROUP
              value: "fake-resource-group"
