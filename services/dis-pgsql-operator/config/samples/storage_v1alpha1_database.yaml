# Single-tenant layout: one Database on its own DatabaseServer.
apiVersion: storage.dis.altinn.cloud/v1alpha1
kind: Database
metadata:
  name: router
  namespace: default
spec:
  name: router
  server:
    name: db1
  access:
    principals:
      - role: Owner
        identityRef:
          name: myproduct-router-dev
      - role: Owner
        group:
          name: my-team-db-owners
          principalId: "11111111-1111-1111-1111-111111111111"
  deletionPolicy: Retain
---
# Multitenant layout: multiple Database resources on one shared DatabaseServer.
apiVersion: storage.dis.altinn.cloud/v1alpha1
kind: Database
metadata:
  name: orders
  namespace: default
spec:
  name: orders
  server:
    name: shared-db
  access:
    principals:
      - role: Writer
        identityRef:
          name: myproduct-orders-dev
      - role: Owner
        group:
          name: my-team-db-owners
          principalId: "11111111-1111-1111-1111-111111111111"
      - role: Writer
        servicePrincipal:
          name: myapp-workflow-at23
          principalId: "22222222-2222-2222-2222-222222222222"
  deletionPolicy: Retain
---
apiVersion: storage.dis.altinn.cloud/v1alpha1
kind: Database
metadata:
  name: billing
  namespace: default
spec:
  name: billing
  server:
    name: shared-db
  access:
    principals:
      - role: Reader
        identityRef:
          name: myproduct-billing-dev
      - role: Owner
        group:
          name: my-team-db-owners
          principalId: "11111111-1111-1111-1111-111111111111"
  deletionPolicy: Retain
