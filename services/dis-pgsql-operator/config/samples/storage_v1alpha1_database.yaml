# Single-tenant layout: one Database on its own DatabaseServer.
apiVersion: storage.dis.altinn.cloud/v1alpha1
kind: Database
metadata:
  name: router
  namespace: default
spec:
  name: router
  server:
    name: db1
  access:
    app:
      name: myproduct-router-dev
      principalId: "00000000-0000-0000-0000-000000000000"
    owner:
      name: my-team-db-owners
      principalId: "11111111-1111-1111-1111-111111111111"
  deletionPolicy: Retain
---
# Multitenant layout: multiple Database resources on one shared DatabaseServer.
apiVersion: storage.dis.altinn.cloud/v1alpha1
kind: Database
metadata:
  name: orders
  namespace: default
spec:
  name: orders
  server:
    name: shared-db
  access:
    app:
      name: myproduct-orders-dev
      principalId: "22222222-2222-2222-2222-222222222222"
    owner:
      name: my-team-db-owners
      principalId: "11111111-1111-1111-1111-111111111111"
  deletionPolicy: Retain
---
apiVersion: storage.dis.altinn.cloud/v1alpha1
kind: Database
metadata:
  name: billing
  namespace: default
spec:
  name: billing
  server:
    name: shared-db
  access:
    app:
      name: myproduct-billing-dev
      principalId: "33333333-3333-3333-3333-333333333333"
    owner:
      name: my-team-db-owners
      principalId: "11111111-1111-1111-1111-111111111111"
  deletionPolicy: Retain
