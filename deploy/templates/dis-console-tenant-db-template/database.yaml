apiVersion: storage.dis.altinn.cloud/v1alpha1
kind: Database
metadata:
  name: ${DISDB_METANAME}
  namespace: product-dis
spec:
  name: ${DISDB_PGNAME}
  server:
    name: dis-console-central
  access:
    principals:
      - role: Owner
        servicePrincipal:
          name: ${DISDB_GRANTEE_NAME}
          principalId: "${DISDB_GRANTEE_OID}"
      - role: Reader
        identityRef:
          name: dis-console
  deletionPolicy: Retain
