name: VPN Access Request
description: Request VPN and ACL access (Headscale / Tailscale)
title: "[VPN Access] <Full Name>"
labels: ["access-request", "vpn"]

body:
  - type: markdown
    attributes:
      value: |
        ## VPN Access Request

        Access to VPN and ACL groups requires documented approval.

        Approval must be given by:
        - Product Owner
        - Team Lead
        - Team Architect

        Do not grant access before approval is written in this issue.

  - type: input
    id: full_name
    attributes:
      label: Full name
      placeholder: John Doe
    validations:
      required: true

  - type: input
    id: email
    attributes:
      label: Entra ID email (@altinn.cloud)
      placeholder: user@altinn.cloud
      description: Must match the user’s Entra ID account.
    validations:
      required: true

  - type: textarea
    id: requested_access
    attributes:
      label: Requested access
      description: |
        Specify required access clearly.

        Examples:
        - VPN authentication (headscale-vpn-access)
        - ACL group: group:team-core
        - ACL group: group:altinn-platform
        - Exit node access (test / prod)
      placeholder: |
        - headscale-vpn-access
        - group:team-core
        - Exit node: test
    validations:
      required: true

  - type: textarea
    id: justification
    attributes:
      label: Business justification
      placeholder: Explain why this access is required
    validations:
      required: true

  - type: input
    id: approver
    attributes:
      label: Approver (Product Owner / Team Lead / Architect)
      placeholder: Name + role
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        ---
        ### For Admins

        Before closing this issue:

        - [ ] User added to Entra ID group: headscale-vpn-access (if requested)
        - [ ] User added to correct ACL group(s)
        - [ ] Exit-node access confirmed (if requested)
        - [ ] Comment confirming completion
