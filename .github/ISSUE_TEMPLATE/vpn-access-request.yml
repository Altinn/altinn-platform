name: VPN Access Request
description: Request VPN and ACL access (Headscale / Tailscale)
title: "[VPN Access] Your Name"
labels:
  - area/access-mgmt
  - kind/toil
  - status/triage

body:
  - type: markdown
    attributes:
      value: |
        ## VPN Access Request

        See the [VPN Altinn Cloud User Guide](https://digdir.atlassian.net/wiki/x/aoDN7w) for setup instructions.

        Access requires documented approval from:
        - Product Owner
        - Team Lead
        - Team Architect

        Do not grant access before the approver has confirmed in a comment on this issue.

  - type: input
    id: full_name
    attributes:
      label: Full name
      placeholder: John Doe
    validations:
      required: true

  - type: input
    id: team
    attributes:
      label: Team
      placeholder: e.g. Team Core
    validations:
      required: true

  - type: textarea
    id: requested_access
    attributes:
      label: Requested access
      description: |
        List each resource you need access to. For each entry, include the product/area and the service type so admins can locate it in the infrastructure.
        Service types: keyvault, storage, database, vm, kubernetes
      placeholder: |
        - Product A – database (server: foo-db)
        - Product B – keyvault (vault: bar-kv)
    validations:
      required: true

  - type: dropdown
    id: environments
    attributes:
      label: Environments
      options:
        - test
        - prod
        - test and prod
    validations:
      required: true

  - type: textarea
    id: justification
    attributes:
      label: Business justification
      placeholder: Explain why this access is required
    validations:
      required: true

  - type: input
    id: approver
    attributes:
      label: Approver (Product Owner / Team Lead / Architect)
      description: Name and role of the approving person.
      placeholder: Jane Smith, Product Owner
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        ---
        ### For Admins

        Before closing this issue, paste the following checklist in a comment and complete each item:

        ```
        - [ ] Approver has confirmed in a comment on this issue
        - [ ] User added to Entra ID group: headscale-vpn-access (if requested)
        - [ ] User added to correct ACL group(s)
        - [ ] Exit-node access confirmed (if requested)
        - [ ] status/triage label updated as appropriate
        - [ ] Comment confirming completion
        ```
