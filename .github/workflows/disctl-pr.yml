name: Disctl PRs
permissions:
  contents: read

env:
  WORKDIR: tools/disctl

on:
  push:
    branches:
      - "main"
    paths:
      - "tools/disctl/**/*.go"
      - "tools/disctl/go.*"
      - "tools/disctl/Makefile"
      - ".github/workflows/disctl-pr.yml"
  pull_request:
    paths:
      - "tools/disctl/**/*.go"
      - "tools/disctl/go.*"
      - "tools/disctl/Makefile"
      - ".github/workflows/disctl-pr.yml"

jobs:
  tidy:
    runs-on: self-hosted
    defaults:
      run:
        working-directory: ${{ env.WORKDIR }}
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Install Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: "${{ env.WORKDIR }}/go.mod"
          cache-dependency-path: '${{ env.WORKDIR }}/go.sum'
          cache: true
      - name: Check go mod
        run: |
          go mod tidy
          git diff --exit-code go.mod
          git diff --exit-code go.sum

  lint:
    needs: tidy
    runs-on: self-hosted
    defaults:
      run:
        working-directory: ${{ env.WORKDIR }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Install Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: "${{ env.WORKDIR }}/go.mod"
          cache-dependency-path: '${{ env.WORKDIR }}/go.sum'
          cache: true
      - name: lint
        uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee # v9.2.1
        with:
          version: v2.12.2
          working-directory: ${{ env.WORKDIR }}

  test:
    needs: lint
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        include:
          - os: ubuntu-latest
            shell: bash
            test-cmd: make test
          - os: macos-latest
            shell: bash
            test-cmd: make test
          - os: windows-latest
            shell: powershell
            test-cmd: make.exe test
    name: Test - ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: ${{ env.WORKDIR }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Install Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: "${{ env.WORKDIR }}/go.mod"
          cache-dependency-path: '${{ env.WORKDIR }}/go.sum'
          cache: true
      - name: Run tests
        run: ${{ matrix.test-cmd }}
