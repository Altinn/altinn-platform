name: Dis Pgsql Lint and Test

on:
  push:
    branches:
      - main
    paths:
      - services/dis-pgsql-operator/**
      - .github/workflows/dis-pgsql-lint-test.yml
  pull_request:
    branches:
      - main
    paths:
      - services/dis-pgsql-operator/**
      - .github/workflows/dis-pgsql-lint-test.yml

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  lint:
    name: Run linter on Ubuntu
    runs-on: self-hosted
    defaults:
      run:
        working-directory: services/dis-pgsql-operator
    steps:
      - name: Clone the code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: "services/dis-pgsql-operator/go.mod"
          cache-dependency-path: "services/dis-pgsql-operator/go.sum"

      - name: Run linter
        uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee # v9.2.1
        with:
          version: v2.12.2
          working-directory: services/dis-pgsql-operator
  test:
    name: Run tests on Ubuntu
    runs-on: self-hosted
    defaults:
      run:
        working-directory: services/dis-pgsql-operator
    steps:
      - name: Clone the code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: "services/dis-pgsql-operator/go.mod"
          cache-dependency-path: "services/dis-pgsql-operator/go.sum"

      - name: Running Tests
        run: |
          go mod tidy
          make test

  e2e:
    name: Run e2e tests on Kind
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 45
    defaults:
      run:
        working-directory: services/dis-pgsql-operator
    env:
      CONTAINER_TOOL: docker
      CERT_MANAGER_INSTALL_SKIP: "true"
    steps:
      - name: Clone the code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: "services/dis-pgsql-operator/go.mod"
          cache-dependency-path: "services/dis-pgsql-operator/go.sum"

      - name: Run e2e suite on Kind
        run: make test-e2e-kind-ci
