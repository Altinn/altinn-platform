name: Dis Vault Lint and Test

on:
  push:
    branches:
      - main
    paths:
      - services/dis-vault-operator/**
      - .github/workflows/dis-vault-lint-test.yml
  pull_request:
    branches:
      - main
    paths:
      - services/dis-vault-operator/**
      - .github/workflows/dis-vault-lint-test.yml

permissions:
  contents: read

jobs:
  lint:
    name: Run linter on Ubuntu
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/dis-vault-operator
    steps:
      - name: Clone the code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: "services/dis-vault-operator/go.mod"
          cache-dependency-path: "services/dis-vault-operator/go.sum"

      - name: Run linter
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9.2.0
        with:
          version: v2.11.4
          working-directory: services/dis-vault-operator
  test:
    name: Run tests on Ubuntu
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/dis-vault-operator
    steps:
      - name: Clone the code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: "services/dis-vault-operator/go.mod"
          cache-dependency-path: "services/dis-vault-operator/go.sum"

      - name: Running Tests
        run: |
          go mod tidy
          make test
