name: Test Self-Hosted Runners

on:
  workflow_dispatch:

jobs:
  test-altinn-platform:
    name: Test altinn-platform runner
    runs-on:
      - self-hosted
      - default
    steps:
      - name: Print runner info
        run: |
          echo "Hostname: $(hostname)"
          echo "Runner OS: $RUNNER_OS"
          echo "Runner arch: $RUNNER_ARCH"

