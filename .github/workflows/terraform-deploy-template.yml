# File: "./.github/workflows/apply-template.yaml"
on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      log_level:
        required: false
        type: string

jobs:
  deploy:
    name: ${{ inputs.environment }}
    environment: ${{ inputs.environment }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Terraform Initialize
        uses: altinn/altinn-platform/actions/terraform/init@features/794
        with:
          working_directory: ./infrastructure/test
          oidc_type: environments
          oidc_value: ${{ inputs.environment }}
          arm_client_id: 405d731d-ee0e-4a75-88fd-154e182eec21
          tf_state_name: test.tfstate

      - name: Terraform Plan
        uses: altinn/altinn-platform/actions/terraform/plan@features/794
        with:
          working_directory: ./infrastructure/test
          arm_client_id: 405d731d-ee0e-4a75-88fd-154e182eec21
          arm_subscription_id: 19dd7f51-b3f0-45d1-a492-1f9763139e55

      - name: Terraform Apply
        uses: altinn/altinn-platform/actions/terraform/apply@features/794
        with:
          working_directory: ./infrastructure/test
          arm_client_id: 405d731d-ee0e-4a75-88fd-154e182eec21
          arm_subscription_id: 19dd7f51-b3f0-45d1-a492-1f9763139e55
