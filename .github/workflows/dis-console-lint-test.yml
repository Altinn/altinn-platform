name: Dis Console Lint and Test

on:
  push:
    branches:
      - main
    paths:
      - services/dis-console/**
      - Makefile.common
      - .github/workflows/dis-console-lint-test.yml
  pull_request:
    branches:
      - main
    paths:
      - services/dis-console/**
      - Makefile.common
      - .github/workflows/dis-console-lint-test.yml

permissions:
  contents: read

jobs:
  lint:
    name: Run linter on Ubuntu
    runs-on: self-hosted
    defaults:
      run:
        working-directory: services/dis-console
    steps:
      - name: Clone the code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: "services/dis-console/go.mod"
          cache-dependency-path: "services/dis-console/go.sum"

      - name: Run linter
        uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee # v9.2.1
        with:
          version: v2.12.2
          working-directory: services/dis-console
  test:
    name: Run tests on Ubuntu
    runs-on: self-hosted
    defaults:
      run:
        working-directory: services/dis-console
    steps:
      - name: Clone the code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: "services/dis-console/go.mod"
          cache-dependency-path: "services/dis-console/go.sum"

      - name: Run tests
        run: make test
  e2e:
    name: Run e2e tests on Kind
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: services/dis-console
    env:
      CONTAINER_TOOL: docker
    steps:
      - name: Clone the code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: "services/dis-console/go.mod"
          cache-dependency-path: "services/dis-console/go.sum"

      - name: Run e2e suite on Kind
        run: make test-e2e-kind-ci
