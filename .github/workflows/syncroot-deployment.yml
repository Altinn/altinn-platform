name: Altinn Product Syncroots

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ !contains(github.ref, 'refs/heads/main')}}

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/syncroot-deployment.yml
      - actions/terraform/apply/**
      - actions/terraform/plan/**
      - infrastructure/syncroots/**
      - infrastructure/modules/syncroot-github-repo/**
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/syncroot-deployment.yml
      - actions/terraform/apply/**
      - actions/terraform/plan/**
      - infrastructure/syncroots/**
      - infrastructure/modules/syncroot-github-repo/**
  workflow_dispatch:
    inputs:
      log_level:
        required: true
        description: Terraform Log Level
        default: INFO
        type: choice
        options:
          - TRACE
          - DEBUG
          - INFO
          - WARN
          - ERROR

env:
  ENVIRONMENT: prod
  TF_STATE_NAME: syncroots.tfstate
  TF_PROJECT: ./infrastructure/syncroots
  ARM_CLIENT_ID: ${{ secrets.TF_AZURE_CLIENT_ID }}
  ARM_SUBSCRIPTION_ID: d43d5057-8389-40d5-88c4-04db9275cbf2

permissions:
  id-token: write
  contents: write
  pull-requests: write

jobs:
  plan:
    name: Plan
    environment: reader
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Get GitHub Organization
        id: get_org
        shell: bash
        run: echo "org=$(jq -r '.github_org_name' infrastructure/syncroots/terraform.tfvars.json)" >> $GITHUB_OUTPUT

      - name: Generate GitHub App Token
        id: generate_token
        uses: actions/create-github-app-token@29824e69f54612133e76f7eaac726eef6c875baf # v2.2.1
        with:
          app-id: ${{ vars.GH_ADMIN_APP_ID }}
          private-key: ${{ secrets.GH_ADMIN_PEM_PRIVATE_KEY }}
          owner: ${{ steps.get_org.outputs.org }}

      - name: Terraform Plan
        uses: Altinn/altinn-platform/actions/terraform/plan@47add82192c698694abaa8f71f433e3d8fa65c41 # main
        env:
          GITHUB_TOKEN: ${{ steps.generate_token.outputs.token }}
          TF_VAR_subscription_id: ${{ secrets.SYNCROOT_SUBSCRIPTION_ID }}
        with:
          working_directory: ${{ env.TF_PROJECT }}
          oidc_type: environment
          oidc_value: ${{ env.ENVIRONMENT }}
          arm_client_id: ${{ env.ARM_CLIENT_ID }}
          arm_subscription_id: ${{ env.ARM_SUBSCRIPTION_ID }}
          tf_state_name: ${{ env.TF_STATE_NAME }}
          gh_token: ${{ secrets.GITHUB_TOKEN }}

  deploy:
    name: Deploy
    environment: prod
    if: github.ref == 'refs/heads/main'
    needs: plan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Get GitHub Organization
        id: get_org
        shell: bash
        run: echo "org=$(jq -r '.github_org_name' infrastructure/syncroots/terraform.tfvars.json)" >> $GITHUB_OUTPUT

      - name: Generate GitHub App Token
        id: generate_token
        uses: actions/create-github-app-token@29824e69f54612133e76f7eaac726eef6c875baf # v2.2.1
        with:
          app-id: ${{ vars.GH_ADMIN_APP_ID }}
          private-key: ${{ secrets.GH_ADMIN_PEM_PRIVATE_KEY }}
          owner: ${{ steps.get_org.outputs.org }}

      - name: Terraform Apply
        uses: Altinn/altinn-platform/actions/terraform/apply@47add82192c698694abaa8f71f433e3d8fa65c41 # main
        env:
          GITHUB_TOKEN: ${{ steps.generate_token.outputs.token }}
          TF_VAR_subscription_id: ${{ secrets.SYNCROOT_SUBSCRIPTION_ID }}
        with:
          working_directory: ${{ env.TF_PROJECT }}
          oidc_type: environment
          oidc_value: ${{ env.ENVIRONMENT }}
          arm_client_id: ${{ env.ARM_CLIENT_ID }}
          arm_subscription_id: ${{ env.ARM_SUBSCRIPTION_ID }}
          tf_state_name: ${{ env.TF_STATE_NAME }}

  syncroot-images:
    name: Syncroot Images
    if: github.ref == 'refs/heads/main'
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Login to Azure
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2.3.0
        with:
          client-id: ${{ secrets.AZURE_ALTINNACR_APP_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_ALTINNACR_SUBSCRIPTION_ID }}

      - name: Process Syncroot Images
        shell: bash
        env:
          ACR_SUBSCRIPTION_ID: ${{ secrets.AZURE_ALTINNACR_SUBSCRIPTION_ID }}
        run: |
          TAGS=("at22" "at23" "at24" "tt02" "yt01" "prod")
          ACR_NAME="altinncr"
          ACR_LOGIN_SERVER="${ACR_NAME}.azurecr.io"
          ACR_RESOURCE_GROUP="acr"
          SOURCE_IMAGE="dis/default-syncroot:latest"

          # Extract product keys from terraform.tfvars.json
          PRODUCTS=$(jq -r '.product_syncroot_source_repos | keys[]' infrastructure/syncroots/terraform.tfvars.json)

          for PRODUCT in $PRODUCTS; do
            TARGET_REPO="${PRODUCT}/syncroot"
            echo "Checking product: ${PRODUCT}"

            for TAG in "${TAGS[@]}"; do
              echo "  Target tag: ${TAG}"

              # Check if tag exists
              if az acr repository show --name "$ACR_NAME" --image "${TARGET_REPO}:${TAG}" --subscription "$ACR_SUBSCRIPTION_ID" &>/dev/null; then
                echo "    Tag ${TAG} already exists for ${TARGET_REPO}. Skipping."
              else
                echo "    Tag ${TAG} not found. Importing from ${SOURCE_IMAGE}..."
                az acr import \
                  --name "${ACR_NAME}" \
                  --resource-group "${ACR_RESOURCE_GROUP}" \
                  --source "${ACR_LOGIN_SERVER}/${SOURCE_IMAGE}" \
                  --image "${TARGET_REPO}:${TAG}" \
                  --subscription "${ACR_SUBSCRIPTION_ID}"
              fi
            done
          done
