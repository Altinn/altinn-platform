name: Altinn Product Syncroots

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ !contains(github.ref, 'refs/heads/main')}}

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/syncroot-deployment.yml
      - actions/terraform/apply/**
      - actions/terraform/plan/**
      - infrastructure/syncroots/**
      - infrastructure/modules/syncroot-github-repo/**
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/syncroot-deployment.yml
      - actions/terraform/apply/**
      - actions/terraform/plan/**
      - infrastructure/syncroots/**
      - infrastructure/modules/syncroot-github-repo/**
  workflow_dispatch:
    inputs:
      log_level:
        required: true
        description: Terraform Log Level
        default: INFO
        type: choice
        options:
          - TRACE
          - DEBUG
          - INFO
          - WARN
          - ERROR

env:
  ENVIRONMENT: prod
  TF_STATE_NAME: syncroots.tfstate
  TF_PROJECT: ./infrastructure/syncroots
  ARM_CLIENT_ID: ${{ secrets.TF_AZURE_CLIENT_ID }}
  ARM_SUBSCRIPTION_ID: d43d5057-8389-40d5-88c4-04db9275cbf2

permissions:
  id-token: write
  contents: write
  pull-requests: write

jobs:
  plan:
    name: Plan
    environment: reader
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Generate GitHub App Token
        id: generate_token
        uses: actions/create-github-app-token@29824e69f54612133e76f7eaac726eef6c875baf # v2.2.1
        with:
          app-id: ${{ vars.GH_ADMIN_APP_ID }}
          private-key: ${{ secrets.GH_ADMIN_PEM_PRIVATE_KEY }}
          owner: Altinn

      - name: Terraform Plan
        uses: Altinn/altinn-platform/actions/terraform/plan@0be6bf2f191006bb8011ebe55071c6796945cafa # main
        env:
          GITHUB_TOKEN: ${{ steps.generate_token.outputs.token }}
          TF_VAR_subscription_id: ${{ secrets.SYNCROOT_SUBSCRIPTION_ID }}
        with:
          working_directory: ${{ env.TF_PROJECT }}
          oidc_type: environment
          oidc_value: ${{ env.ENVIRONMENT }}
          arm_client_id: ${{ env.ARM_CLIENT_ID }}
          arm_subscription_id: ${{ env.ARM_SUBSCRIPTION_ID }}
          tf_state_name: ${{ env.TF_STATE_NAME }}
          gh_token: ${{ secrets.GITHUB_TOKEN }}

  deploy:
    name: Deploy
    environment: prod
    if: github.ref == 'refs/heads/main'
    needs: plan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Generate GitHub App Token
        id: generate_token
        uses: actions/create-github-app-token@29824e69f54612133e76f7eaac726eef6c875baf # v2.2.1
        with:
          app-id: ${{ vars.GH_ADMIN_APP_ID }}
          private-key: ${{ secrets.GH_ADMIN_PEM_PRIVATE_KEY }}
          owner: Altinn

      - name: Terraform Apply
        uses: Altinn/altinn-platform/actions/terraform/apply@0be6bf2f191006bb8011ebe55071c6796945cafa # main
        env:
          GITHUB_TOKEN: ${{ steps.generate_token.outputs.token }}
          TF_VAR_subscription_id: ${{ secrets.SYNCROOT_SUBSCRIPTION_ID }}
        with:
          working_directory: ${{ env.TF_PROJECT }}
          oidc_type: environment
          oidc_value: ${{ env.ENVIRONMENT }}
          arm_client_id: ${{ env.ARM_CLIENT_ID }}
          arm_subscription_id: ${{ env.ARM_SUBSCRIPTION_ID }}
          tf_state_name: ${{ env.TF_STATE_NAME }}
