name: Test K6 Actions
# Two supported ways of running K6 tests.
# Ad-hoc, by manually triggering the pipeline
#
# Whenever a certain Github event happens (e.g. when merging into master or pushing into a branch)
# Different types of tests can be run depending on the event type, e.g.
# smaller/faster tests might be run at every push/successful build
# bigger/longer tests might be run after PR approvals just before merging
on:
  push:

  #workflow_dispatch:
  #  inputs:
  #    test_script_filepath:
  #      required: true
  #      type: string
  #      default: "./services/k6/first_test.js"
  #    vus:
  #      required: true
  #      type: number
  #      default: 10
  #    duration:
  #      required: true
  #      type: string
  #      default: "1m"
  #    namespace:
  #      required: true
  #      type: string
  #      default: "platform"

permissions:
  id-token: write
  contents: read

jobs:
  k6-test-run-push:
    if: github.event_name == 'push'
    environment: reader
    runs-on: ubuntu-latest
    steps:

    - name: Checkout code
      id: checkout_code
      uses: actions/checkout@v4

    - name: Run k6 tests
      uses: ./actions/run-k6-tests/
      with:
        azure-client-id: ${{ vars.TF_AZURE_CLIENT_ID }}
        azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        azure-subscription-id: "1ce8e9af-c2d6-44e7-9c5e-099a308056fe"

        # test_script_filepath: "./services/k6/first_test.js"
        test_script_filepath: "./services/k6/second_test.js"
        namespace: "platform"

        wait_for_test_to_finish: "False"
        # Override the defaults by passing in CLI args
        # command_line_args: "--vus 23 --duration 7m"


