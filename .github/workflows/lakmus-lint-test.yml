name: Lakmus Lint and Test

on:
  push:
    branches:
      - main
    paths:
      - services/lakmus/**
      - .github/workflows/lakmus-lint-test.yml
  pull_request:
    branches:
      - main
    paths:
      - services/lakmus/**
      - .github/workflows/lakmus-lint-test.yml

permissions:
  contents: read

jobs:
  lint-and-test:
    name: Lint and Test on Ubuntu
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/lakmus
    steps:
      - name: Clone the code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: 'services/lakmus/go.mod'
          cache-dependency-path: 'services/lakmus/go.sum'

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '20'

      - name: Install cdk8s CLI
        run: npm install -g cdk8s-cli@2.201.15

      - name: Refresh generated cdk8s imports
        run: make manifests-imports

      - name: Run linter
        uses: golangci/golangci-lint-action@4afd733a84b1f43292c63897423277bb7f4313a9 # v8.0.0
        with:
          version: v2.11.4
          working-directory: services/lakmus
          args: ./cmd/... ./internal/... ./manifests/... ./pkg/... ./test/azfakes/...

      - name: Verify generated manifests
        run: make manifests-verify

      - name: Running Tests
        run: |
          make tidy
          make test
