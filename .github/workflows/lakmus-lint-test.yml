name: Lakmus Lint and Test

on:
  push:
    branches:
      - main
    paths:
      - services/lakmus/**
      - .github/workflows/lakmus-lint-test.yml
  pull_request:
    branches:
      - main
    paths:
      - services/lakmus/**
      - .github/workflows/lakmus-lint-test.yml

permissions:
  contents: read

jobs:
  lint-and-test:
    name: Lint and Test on Ubuntu
    runs-on: self-hosted
    defaults:
      run:
        working-directory: services/lakmus
    steps:
      - name: Clone the code
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6.1.0

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: 'services/lakmus/go.mod'
          cache-dependency-path: 'services/lakmus/go.sum'

      - name: Setup Node
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0
        with:
          node-version: '20'

      - name: Install cdk8s CLI
        run: npm install -g cdk8s-cli@2.201.15

      - name: Refresh generated cdk8s imports
        run: make manifests-imports

      - name: Run linter
        uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9.3.0
        with:
          version: v2.12.2
          working-directory: services/lakmus
          args: ./cmd/... ./internal/... ./manifests/... ./pkg/... ./test/azfakes/...

      - name: Verify generated manifests
        run: make manifests-verify

      - name: Running Tests
        run: |
          make tidy
          make test
